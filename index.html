<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100种不可思议旅行</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
          },
          colors: {
            deep: '#0B0F19',
            card: '#111827',
            elevated: '#1F2937',
            'accent-amber': '#F59E0B',
            'accent-cyan': '#06B6D4',
            'accent-rose': '#F43F5E',
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background-color: #0B0F19;
      color: #F9FAFB;
    }

    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0B0F19; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4B5563; }

    /* 卡片 hover 动效 */
    .travel-card { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .travel-card:hover { transform: translateY(-4px); }
    .travel-card img { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .travel-card:hover img { transform: scale(1.08); }
    .travel-card .card-overlay { transition: opacity 0.4s ease; }
    .travel-card:hover .card-overlay { opacity: 0.9; }
    .travel-card .card-meta { transition: all 0.3s ease; opacity: 0; transform: translateY(8px); }
    .travel-card:hover .card-meta { opacity: 1; transform: translateY(0); }

    /* 弹窗动画 */
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes modalInMobile {
      from { opacity: 0; transform: translateY(100%); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal-animate { animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .modal-animate-mobile { animation: modalInMobile 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .fade-in { animation: fadeIn 0.3s ease forwards; }

    /* Stagger 入场 */
    @keyframes staggerIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stagger-item { animation: staggerIn 0.6s ease-out forwards; opacity: 0; }

    /* 滑块自定义样式 */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #374151;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #F59E0B;
      cursor: pointer;
      border: 2px solid #0B0F19;
      box-shadow: 0 0 0 2px #F59E0B;
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #F59E0B;
      cursor: pointer;
      border: 2px solid #0B0F19;
      box-shadow: 0 0 0 2px #F59E0B;
    }

    /* 评分条 */
    .score-bar { height: 4px; border-radius: 2px; background: #374151; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

    /* 横向滚动画廊 */
    .gallery-scroll { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .gallery-scroll > * { scroll-snap-align: start; }
  </style>
</head>
<body class="min-h-screen antialiased">

  <!-- Navbar -->
  <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-2">
          <svg class="w-7 h-7 text-accent-amber" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
          <span class="text-lg font-bold tracking-tight text-white">100种不可思议旅行</span>
        </div>
        <button id="exploreBtn" class="flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 text-sm font-medium transition-all duration-200 hover:border-white/20">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <span>探索</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="relative pt-32 pb-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-7xl mx-auto text-center">
      <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold tracking-tight text-white mb-4 opacity-0" style="animation: staggerIn 1s ease-out 0.2s forwards;">
        100 种不可思议旅行
      </h1>
      <p class="text-lg sm:text-xl text-gray-400 max-w-2xl mx-auto opacity-0" style="animation: staggerIn 1s ease-out 0.4s forwards;">
        地球上尚未被广泛看见的瞬间，正在等待你的目光
      </p>
    </div>
  </section>

  <!-- Filter Bar -->
  <section class="sticky top-16 z-40 bg-deep/90 backdrop-blur-md border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
      <div class="flex items-center gap-2 overflow-x-auto no-scrollbar" id="filterBar">
        <!-- Filter chips injected by JS -->
      </div>
    </div>
  </section>

  <!-- Travel Waterfall -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div id="waterfall" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
      <!-- Cards injected by JS -->
    </div>
    <div id="emptyState" class="hidden text-center py-24">
      <svg class="w-16 h-16 mx-auto text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/>
      </svg>
      <p class="text-gray-500 text-lg">暂无匹配的旅行</p>
      <p class="text-gray-600 text-sm mt-1">尝试调整筛选条件</p>
    </div>
  </main>

  <!-- Detail Card Modal -->
  <div id="detailModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm fade-in" id="detailBackdrop"></div>
    <div class="absolute inset-0 flex items-end sm:items-center justify-center p-0 sm:p-4 pointer-events-none">
      <div id="detailContent" class="w-full sm:max-w-2xl sm:rounded-2xl bg-card max-h-[92vh] sm:max-h-[85vh] overflow-y-auto pointer-events-auto lg:modal-animate modal-animate-mobile">
        <!-- Detail content injected by JS -->
      </div>
    </div>
  </div>

  <!-- Explore Modal -->
  <div id="exploreModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm fade-in" id="exploreBackdrop"></div>
    <div class="absolute inset-0 flex items-end sm:items-center justify-center p-0 sm:p-4 pointer-events-none">
      <div id="exploreContent" class="w-full sm:max-w-md sm:rounded-2xl bg-elevated max-h-[80vh] overflow-y-auto pointer-events-auto lg:modal-animate modal-animate-mobile">
        <!-- Explore content injected by JS -->
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
